api:
  - name: xero-accounting
    path: accounting
  - name: xero-projects
    path: projects

languages:
  java:
    sdk_name: xeroaccountingjava
    ci_cd:
      - github
    group_id: com.yourorg
  python:
    sdk_name: xero_accounting_py
    ci_cd:
      - github
  typescript:
    sdk_name: xero_accounting_ts
    ci_cd:
      - github
  rust:
    sdk_name: xero_accounting_rs
    ci_cd:
      - github
    cli: false
  go:
    sdk_name: xero_accounting_go
    ci_cd:
      - github
  csharp:
    sdk_name: XeroAccountingCSharp
    ci_cd:
      - github

servers:
  - url: https://api.xero.com/api.xro/2.0
    name: accounting
    api: xero-accounting
    default: true
  - url: https://api.xero.com/projects.xro/2.0
    name: projects
    api: xero-projects
    default: true

auths:
  - id: OAuth2
    access_token_json_pointer: /access_token
    expires_in_json_pointer: /expires_in
    credentials_location: request_body
    body_content_type: form
    param: oauth

default_module_structure: path

